name: Security Dependency Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  dependency-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache OWASP NVD data
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ hashFiles('build.gradle', 'gradle.properties') }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: Run weekly OWASP dependency scan
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          GRADLE_OPTS: "-Xmx2048m -XX:MaxMetaspaceSize=512m"
        run: ./gradlew --no-daemon dependencyCheckAnalyze

      - name: Upload OWASP dependency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: |
            build/reports/dependency-check-report.html
            build/reports/dependency-check-report.json
          if-no-files-found: warn
